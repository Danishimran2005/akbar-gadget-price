<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKBAR GADGET Spare Part Price List</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f4f4f4;
    }
    header{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }
    .logo{
      width:90px;
      height:90px;
      object-fit:contain;
      display:block;
      margin:0 auto 12px;
      background:white;
      padding:8px;
      border-radius:14px;
      box-sizing:border-box;
    }
    header h1{
      margin:0;
      font-size:28px;
    }
    header p{
      margin:8px 0 0;
      color:#ddd;
      font-size:14px;
    }
    .container{
      max-width:1100px;
      margin:auto;
      padding:20px;
    }
    .search-box{
      text-align:center;
      margin-bottom:14px;
    }
    .search-box input{
      width:90%;
      max-width:400px;
      padding:12px;
      font-size:16px;
      border-radius:8px;
      border:1px solid #ccc;
    }
    .brand-filters{
      text-align:center;
      margin-bottom:20px;
    }
    .brand-btn{
      padding:10px 16px;
      margin:4px;
      border:none;
      border-radius:8px;
      background:#222;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }
    .brand-btn.active{
      background:#ff9800;
      color:#111;
    }
    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }
    .card{
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 4px 8px rgba(0,0,0,0.1);
    }
    .card img{
      width:100%;
      height:220px;
      object-fit:contain;
      background:#fff;
      padding:10px;
      box-sizing:border-box;
      display:block;
    }
    .card-content{
      padding:15px;
    }
    .card h2{
      margin:0 0 10px;
    }
    .brand-tag{
      display:inline-block;
      margin-bottom:10px;
      padding:4px 10px;
      border-radius:999px;
      background:#eee;
      font-size:12px;
      font-weight:bold;
      color:#444;
    }
    .price-list p{
      margin:6px 0;
      font-size:15px;
    }
    .note{
      color:#666;
      font-size:13px;
    }
    .whatsapp-btn{
      display:inline-block;
      margin-top:10px;
      padding:10px 15px;
      background:#25d366;
      color:white;
      text-decoration:none;
      border-radius:6px;
      font-weight:bold;
    }
    .whatsapp-btn:hover{
      background:#1ebe5d;
    }
    .status{
      text-align:center;
      color:#666;
      margin-top:20px;
      font-size:15px;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo-dir7.png" alt="AKBAR Gadget Logo" class="logo">
    <h1>AKBAR GADGET Spare Part Price List</h1>
    <p>Scan sekali, cari model phone dan semak harga spare part</p>
  </header>

  <div class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search phone model...">
    </div>

    <div class="brand-filters" id="brandFilters"></div>

    <div class="product-grid" id="productGrid"></div>
    <div class="status" id="status">Loading data...</div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQU7IxnvEl-q2rOvvY-W07bBDEtzLzMf_RdIO1cFhFl_akWCAO-CMBAWwsvW4CIGI6JXwS13WHq9meC/pub?output=csv";
    const whatsappNumber = "60126647699";

    let allProducts = [];
    let currentBrand = "All";

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (insideQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function normalizeHeader(header) {
      return header
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_")
        .replace(/[()]/g, "")
        .replace(/-/g, "_");
    }

    function parseCSV(csvText) {
      const lines = csvText.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = parseCSVLine(lines[0]).map(normalizeHeader);

      return lines.slice(1).map(line => {
        const values = parseCSVLine(line);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = values[index] ? values[index].trim() : "";
        });

        return row;
      }).filter(row => row["model"]);
    }

    function formatPrice(value) {
      if (!value) return "-";
      return value.toString().toLowerCase().includes("rm") ? value : "RM" + value;
    }

    function createCard(product) {
      const brand = product["brand"] || "";
      const model = product["model"] || "";
      const image = product["image"] || "";

      const lcdWarranty = product["lcd_1_week_warranty"] || "";
      const lcdNoWarranty = product["lcd_no_warranty"] || "";

      const batteryWarranty = product["battery_1_week_warranty"] || "";
      const batteryNoWarranty = product["battery_no_warranty"] || "";

      const chargingPortWarranty = product["charging_port_1_week_warranty"] || "";
      const chargingPortNoWarranty = product["charging_port_no_warranty"] || "";

      const message = encodeURIComponent("Saya nak tanya tentang " + model);

      return `
        <div class="card">
          <img src="${image}" alt="${model}" onerror="this.src='https://via.placeholder.com/400x220?text=No+Image';">
          <div class="card-content">
            <div class="brand-tag">${brand}</div>
            <h2>${model}</h2>

            <div class="price-list">
              <p><strong>LCD:</strong> ${formatPrice(lcdNoWarranty)} <span class="note">(No Warranty)</span></p>
              <p><strong>LCD:</strong> ${formatPrice(lcdWarranty)} <span class="note">(Warranty 1 Week)</span></p>

              <p><strong>Battery:</strong> ${formatPrice(batteryNoWarranty)} <span class="note">(No Warranty)</span></p>
              <p><strong>Battery:</strong> ${formatPrice(batteryWarranty)} <span class="note">(Warranty 1 Week)</span></p>

              <p><strong>Charging Port:</strong> ${formatPrice(chargingPortNoWarranty)} <span class="note">(No Warranty)</span></p>
              <p><strong>Charging Port:</strong> ${formatPrice(chargingPortWarranty)} <span class="note">(Warranty 1 Week)</span></p>
            </div>

            <a class="whatsapp-btn"
               href="https://wa.me/${whatsappNumber}?text=${message}"
               target="_blank">
               WhatsApp Now
            </a>
          </div>
        </div>
      `;
    }

    function getFilteredProducts() {
      const searchValue = document.getElementById("searchInput").value.toLowerCase();

      return allProducts.filter(product => {
        const model = (product["model"] || "").toLowerCase();
        const brand = (product["brand"] || "").toLowerCase();

        const matchSearch = model.includes(searchValue);
        const matchBrand = currentBrand === "All" || brand === currentBrand.toLowerCase();

        return matchSearch && matchBrand;
      });
    }

    function renderProducts(products) {
      const productGrid = document.getElementById("productGrid");
      const status = document.getElementById("status");

      if (products.length === 0) {
        productGrid.innerHTML = "";
        status.textContent = "Tiada data dijumpai.";
        return;
      }

      productGrid.innerHTML = products.map(createCard).join("");
      status.textContent = "";
    }

    function renderBrandFilters(products) {
      const brandFilters = document.getElementById("brandFilters");

      const brands = [...new Set(
        products
          .map(product => product["brand"])
          .filter(Boolean)
      )];

      const allBrands = ["All", ...brands];

      brandFilters.innerHTML = allBrands.map(brand => `
        <button class="brand-btn ${brand === currentBrand ? "active" : ""}" data-brand="${brand}">
          ${brand}
        </button>
      `).join("");

      document.querySelectorAll(".brand-btn").forEach(btn => {
        btn.addEventListener("click", function() {
          currentBrand = this.dataset.brand;
          renderBrandFilters(allProducts);
          renderProducts(getFilteredProducts());
        });
      });
    }

    async function loadSheetData() {
      const status = document.getElementById("status");

      try {
        const response = await fetch(sheetURL);
        const csvText = await response.text();

        allProducts = parseCSV(csvText);
        renderBrandFilters(allProducts);
        renderProducts(getFilteredProducts());
      } catch (error) {
        console.error("Error loading sheet data:", error);
        status.textContent = "Data tak berjaya load. Sila check link Google Sheet.";
      }
    }

    document.getElementById("searchInput").addEventListener("keyup", function() {
      renderProducts(getFilteredProducts());
    });

    loadSheetData();
  </script>
</body>
</html>
