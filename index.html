<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKBAR GADGET Spare Part Price List</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

.logo{
  width:90px;
  height:90px;
  object-fit:contain;
  display:block;
  margin:0 auto 12px;
  background:white;
  padding:8px;
  border-radius:14px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.search-box{
  text-align:center;
  margin-bottom:14px;
}

.search-box input{
  width:90%;
  max-width:400px;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

.brand-filters{
  text-align:center;
  margin-bottom:20px;
}

.brand-btn{
  padding:10px 16px;
  margin:4px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}

.brand-btn.active{
  background:#ff9800;
  color:#111;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:220px;
  object-fit:contain;
  background:#fff;
  padding:10px;
}

.card-content{
  padding:15px;
}

.brand-tag{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#eee;
  font-size:12px;
  margin-bottom:8px;
}

.price-list p{
  margin:6px 0;
}

.price-warranty{
  color:#16a34a;
  font-weight:bold;
}

.price-nowarranty{
  color:#6b7280;
}

.whatsapp-btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:#25d366;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
}

.status{
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <img src="logo-dir7.png" class="logo">
  <h1>AKBAR GADGET Spare Part Price List</h1>
  <p>Scan sekali, cari model phone dan semak harga spare part</p>
</header>

<div class="container">

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search phone model...">
</div>

<div class="brand-filters" id="brandFilters"></div>

<div class="product-grid" id="productGrid"></div>
<div class="status" id="status">Loading...</div>

</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQU7IxnvEl-q2rOvvY-W07bBDEtzLzMf_RdIO1cFhFl_akWCAO-CMBAWwsvW4CIGI6JXwS13WHq9meC/pub?output=csv";
const whatsappNumber = "60126647699";

let allProducts = [];
let currentBrand = "All";

function normalizeHeader(header){
  return header.toLowerCase()
  .replace(/\s+/g,"_")
  .replace(/[()]/g,"");
}

function parseCSV(csv){
  const lines = csv.split("\n");
  const headers = lines[0].split(",").map(normalizeHeader);

  return lines.slice(1).map(line=>{
    const values = line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h]=values[i]);
    return obj;
  }).filter(p=>p.model);
}

function formatPrice(v){
  if(!v) return "-";
  return v.includes("RM")?v:"RM"+v;
}

function createCard(p){

const model=p.model||"";
const brand=p.brand||"";
const image=p.image||"";

const lcd_w=p.lcd_1_week_warranty||"";
const lcd_n=p.lcd_no_warranty||"";

const bat_w=p.battery_1_week_warranty||"";
const bat_n=p.battery_no_warranty||"";

const cp_w=p.charging_port_1_week_warranty||"";
const cp_n=p.charging_port_no_warranty||"";

const msg=encodeURIComponent("Saya nak tanya tentang "+model);

return `
<div class="card">
<img src="${image}" onerror="this.src='https://via.placeholder.com/400x220?text=No+Image'">

<div class="card-content">

<div class="brand-tag">${brand}</div>
<h2>${model}</h2>

<div class="price-list">

<p>LCD:
<span class="price-nowarranty">${formatPrice(lcd_n)}</span>
<span>(No Warranty)</span></p>

<p>LCD:
<span class="price-warranty">${formatPrice(lcd_w)}</span>
<span>(Warranty 1 Week)</span></p>

<p>Battery:
<span class="price-nowarranty">${formatPrice(bat_n)}</span>
<span>(No Warranty)</span></p>

<p>Battery:
<span class="price-warranty">${formatPrice(bat_w)}</span>
<span>(Warranty 1 Week)</span></p>

<p>Charging Port:
<span class="price-nowarranty">${formatPrice(cp_n)}</span>
<span>(No Warranty)</span></p>

<p>Charging Port:
<span class="price-warranty">${formatPrice(cp_w)}</span>
<span>(Warranty 1 Week)</span></p>

</div>

<a class="whatsapp-btn"
href="https://wa.me/${whatsappNumber}?text=${msg}"
target="_blank">
WhatsApp Now
</a>

</div>
</div>
`;
}

function render(){
let filtered=allProducts.filter(p=>{
let m=(p.model||"").toLowerCase();
let b=(p.brand||"").toLowerCase();
let s=document.getElementById("searchInput").value.toLowerCase();

return m.includes(s) && (currentBrand=="All"||b==currentBrand.toLowerCase());
});

document.getElementById("productGrid").innerHTML=filtered.map(createCard).join("");
}

function renderBrands(){
let brands=["All",...new Set(allProducts.map(p=>p.brand).filter(Boolean))];

document.getElementById("brandFilters").innerHTML=brands.map(b=>`
<button class="brand-btn ${b==currentBrand?"active":""}" onclick="selectBrand('${b}')">${b}</button>
`).join("");
}

function selectBrand(b){
currentBrand=b;
renderBrands();
render();
}

document.getElementById("searchInput").addEventListener("keyup",render);

async function load(){
let res=await fetch(sheetURL);
let text=await res.text();
allProducts=parseCSV(text);
renderBrands();
render();
}

load();

</script>

</body>
</html>
